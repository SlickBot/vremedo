name: Live tests

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-tests
  cancel-in-progress: false

jobs:
  live:
    name: Live web-source tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Run live web-source tests
        run: ./gradlew test -PliveTests --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: live-test-reports
          path: app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14
